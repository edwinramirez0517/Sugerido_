<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Abastecimiento AEC - Pro</title>
    <style>
        :root {
            --primary-navy: #0B2046;
            --secondary-blue: #1A3668;
            --white: #FFFFFF;
            --light-gray: #F4F7F6;
            --accent-blue: #3A6EA5;
            --green-envio: #2E7D32;
            --yellow-alerta: #FBC02D;
            --red-quiebre: #D32F2F;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-gray);
            margin: 0;
            color: #333;
        }

        /* Navegación Corporativa */
        .header {
            background-color: var(--primary-navy);
            color: var(--white);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-tabs {
            display: flex;
            background-color: var(--secondary-blue);
            padding: 0 30px;
            gap: 20px;
            overflow-x: auto;
            border-bottom: 3px solid var(--accent-blue);
        }

        .nav-link {
            padding: 15px 20px;
            color: #A0B4D6;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .nav-link.active {
            color: var(--white);
            border-bottom: 3px solid var(--white);
        }

        .container {
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        /* Filtros e Indicadores */
        .dashboard-controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }

        .card {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-left: 5px solid var(--accent-blue);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .filter-group label {
            font-weight: bold;
            color: var(--primary-navy);
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        select, input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        /* Botón de Selección Única (Unidades vs Moneda) */
        .switch-container {
            display: flex;
            border: 2px solid var(--accent-blue);
            border-radius: 8px;
            overflow: hidden;
            width: fit-content;
        }

        .switch-btn {
            padding: 10px 20px;
            border: none;
            background: var(--white);
            color: var(--accent-blue);
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .switch-btn.active {
            background: var(--accent-blue);
            color: var(--white);
        }

        /* Tabla Interactiva */
        .table-section {
            background: var(--white);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background-color: var(--primary-navy);
            color: var(--white);
        }

        th {
            padding: 15px;
            font-size: 0.85rem;
            text-transform: uppercase;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        tr:hover {
            background-color: #f9fbfd;
        }

        /* Semáforo */
        .semaforo {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.8rem;
            display: inline-block;
            text-align: center;
            min-width: 100px;
        }

        .bg-green { background-color: #E8F5E9; color: var(--green-envio); border: 1px solid var(--green-envio); }
        .bg-yellow { background-color: #FFFDE7; color: #F57F17; border: 1px solid #F57F17; }
        .bg-red { background-color: #FFEBEE; color: var(--red-quiebre); border: 1px solid var(--red-quiebre); }

        .codigo-text {
            color: #666;
            font-family: monospace;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1 style="margin:0; font-size:1.4rem;">Megabodega AEC - Inteligencia Operativa</h1>
        <div>Analista: Edwin Ramirez</div>
    </div>

    <div class="nav-tabs">
        <div class="nav-link active">Sugerido Interactivos</div>
        <div class="nav-link">Despacho</div>
        <div class="nav-link">Distribución</div>
        <div class="nav-link">Etiquetado</div>
    </div>

    <div class="container">
        
        <div class="dashboard-controls">
            <div class="card filter-group">
                <label>Filtrar por División</label>
                <select id="divFilter" onchange="applyFilters()">
                    <option value="TODAS">-- Todas las Divisiones --</option>
                    <option value="INTERIOR DETALLE">INTERIOR DETALLE</option>
                    <option value="BELLEZA">BELLEZA</option>
                    <option value="CALZADO PLASTICO">CALZADO PLASTICO</option>
                </select>
            </div>

            <div class="card filter-group">
                <label>Métrica de Visualización</label>
                <div class="switch-container">
                    <button id="uBtn" class="switch-btn active" onclick="setMetric('U')">Unidades</button>
                    <button id="mBtn" class="switch-btn" onclick="setMetric('L')">Lempiras (L)</button>
                </div>
            </div>

            <div class="card filter-group">
                <label>Buscar por Grupo / Código</label>
                <input type="text" id="searchInput" placeholder="Ej: Boxer, Mascarilla..." onkeyup="applyFilters()">
            </div>
        </div>

        <div class="table-section">
            <table>
                <thead>
                    <tr>
                        <th>Cód. Grupo</th>
                        <th>Descripción del Grupo</th>
                        <th>Saldo Bodega</th>
                        <th>Sugerido Global</th>
                        <th>Estatus Abastecimiento</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- Datos dinámicos aquí -->
                </tbody>
            </table>
        </div>

    </div>

    <script>
        // Datos extraídos del reporte Sugerido vs Saldos
        const rawData = [
            { id: "09001023", div: "INTERIOR DETALLE", grupo: "BOXER P/HOMBRE P/CORTA ALGODON", saldo: 207477, sug: 12372, costo: 45.00 },
            { id: "09001001", div: "INTERIOR DETALLE", grupo: "BOXER P/HOMBRE P/CORTA MICROFIBRA", saldo: 188934, sug: 34188, costo: 52.00 },
            { id: "23003039", div: "BELLEZA", grupo: "MASCARILLA FACIAL MASCARA", saldo: 177596, sug: 31032, costo: 12.50 },
            { id: "23002047", div: "BELLEZA", grupo: "ESMALTE REVEL COLOR", saldo: 143174, sug: 48956, costo: 18.00 },
            { id: "53004007", div: "CALZADO PLASTICO", grupo: "ZAPATILLAS P/NIÑO PRE-JUV D/PLAYA", saldo: 870, sug: 1200, costo: 110.00 },
            { id: "53005005", div: "CALZADO PLASTICO", grupo: "CHANCLETAS P/NIÑO INF D/DEDO MOBEC", saldo: 1794, sug: 3500, costo: 85.00 },
            { id: "09001050", div: "INTERIOR DETALLE", grupo: "CAMISETA P/HOMBRE", saldo: 0, sug: 5000, costo: 95.00 }
        ];

        let currentMetric = 'U';

        function setMetric(m) {
            currentMetric = m;
            document.getElementById('uBtn').classList.toggle('active', m === 'U');
            document.getElementById('mBtn').classList.toggle('active', m === 'L');
            applyFilters();
        }

        function applyFilters() {
            const div = document.getElementById('divFilter').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            const body = document.getElementById('tableBody');
            
            body.innerHTML = '';

            const filtered = rawData.filter(item => {
                const matchDiv = (div === 'TODAS' || item.div === div);
                const matchSearch = item.grupo.toLowerCase().includes(search) || item.id.includes(search);
                return matchDiv && matchSearch;
            });

            filtered.forEach(item => {
                const tr = document.createElement('tr');
                
                // Lógica de cálculo Unidades vs Lempiras
                const factor = currentMetric === 'L' ? item.costo : 1;
                const prefijo = currentMetric === 'L' ? 'L ' : '';
                
                const valSaldo = (item.saldo * factor).toLocaleString();
                const valSug = (item.sug * factor).toLocaleString();

                // Lógica de Semáforo
                let semaforoClass = '';
                let semaforoText = '';
                
                if (item.saldo >= item.sug && item.saldo > 0) {
                    semaforoClass = 'bg-green';
                    semaforoText = 'PARA ENVIAR';
                } else if (item.saldo > 0 && item.saldo < item.sug) {
                    semaforoClass = 'bg-yellow';
                    semaforoText = 'MÁS O MENOS';
                } else {
                    semaforoClass = 'bg-red';
                    semaforoText = 'NO TENEMOS';
                }

                tr.innerHTML = `
                    <td class="codigo-text">${item.id}</td>
                    <td><strong>${item.grupo}</strong><br><small style="color:#999">${item.div}</small></td>
                    <td>${prefijo}${valSaldo}</td>
                    <td>${prefijo}${valSug}</td>
                    <td><span class="semaforo ${semaforoClass}">${semaforoText}</span></td>
                `;
                body.appendChild(tr);
            });
        }

        // Carga inicial
        applyFilters();
    </script>
</body>
</html>
